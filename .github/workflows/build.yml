name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  checks:
    uses: ./.github/workflows/checks.yml

  build:
    name: macOS ARM64
    needs: checks
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          CGO_ENABLED: "1"
          GOOS: darwin
          GOARCH: arm64
        run: go build -trimpath -ldflags="-s -w" -o zurm ./...

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zurm-darwin-arm64
          path: zurm
          retention-days: 7
