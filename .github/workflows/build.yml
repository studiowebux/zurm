name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-macos-arm64:
    name: macOS ARM64
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install tools
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        run: staticcheck ./...

      - name: Gosec
        run: gosec -severity medium ./...

      - name: Govulncheck
        run: govulncheck ./...

      - name: Build
        env:
          CGO_ENABLED: "1"
          GOOS: darwin
          GOARCH: arm64
        run: go build -trimpath -ldflags="-s -w" -o zurm ./...

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zurm-darwin-arm64
          path: zurm
          retention-days: 7
