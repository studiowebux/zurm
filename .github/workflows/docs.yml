name: Docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "CHANGELOG.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout MinimalDoc
        uses: actions/checkout@v4
        with:
          repository: studiowebux/minimaldoc
          path: minimaldoc-src

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: minimaldoc-src/go.sum

      - name: Build MinimalDoc
        run: cd minimaldoc-src && go build -o ../minimaldoc ./cmd/minimaldoc/

      - name: Build docs
        run: ./minimaldoc build docs -o _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
