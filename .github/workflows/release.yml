name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  checks:
    uses: ./.github/workflows/checks.yml

  build:
    name: Build
    needs: checks
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build macOS ARM64
        env:
          CGO_ENABLED: "1"
          GOOS: darwin
          GOARCH: arm64
        run: go build -trimpath -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" -o dist/zurm-macos-arm64 ./...

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/
          retention-days: 7

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/zurm-macos-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
