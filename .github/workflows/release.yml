name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  checks:
    uses: ./.github/workflows/checks.yml

  build:
    name: Build
    needs: checks
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build macOS ARM64
        env:
          CGO_ENABLED: "1"
          GOOS: darwin
          GOARCH: arm64
        run: |
          go build -trimpath -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" -o dist/zurm .
          go build -trimpath -ldflags="-s -w" -o dist/zurm-server ./cmd/zurm-server

      - name: Package .app bundle
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p dist/zurm.app/Contents/MacOS
          mkdir -p dist/zurm.app/Contents/Resources
          cp dist/zurm dist/zurm.app/Contents/MacOS/zurm
          cp dist/zurm-server dist/zurm.app/Contents/MacOS/zurm-server
          cp macos/Info.plist dist/zurm.app/Contents/Info.plist
          cp assets/icons/zurm.icns dist/zurm.app/Contents/Resources/zurm.icns
          sed -i '' "s/__VERSION__/${VERSION}/" dist/zurm.app/Contents/Info.plist
          sed -i '' "s/__BUILD__/${VERSION}/" dist/zurm.app/Contents/Info.plist
          codesign --sign - --force --deep dist/zurm.app

      - name: Create DMG
        run: |
          hdiutil create -volname "Zurm" -srcfolder dist/zurm.app -ov -format UDZO dist/zurm-macos-arm64.dmg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            dist/zurm-macos-arm64.dmg
            dist/zurm
            dist/zurm-server
          retention-days: 7

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/zurm-macos-arm64.dmg
            dist/zurm
            dist/zurm-server
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
